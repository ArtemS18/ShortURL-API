name: "shorturl-dev"
services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: shorturls
      POSTGRES_PASSWORD: shorturls
      POSTGRES_DB: main
    ports:
      - "5434:5432"
    volumes:
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shorturls -d main"]
      interval: 10s
      timeout: 5s
      retries: 5

  shorturl-backend:
    build:
      context: .
      dockerfile: ./deploy/backend/Dockerfile
    volumes:
      - ./config/config.yaml:/app/config/config.yaml
    ports:
      - "8000:8000"
    environment:
      SRV_HOST: 0.0.0.0
      SRV_NODE_ID: 1
      DATABASE_TYPE: postgres
      PG_HOST: postgres
      PG_PORT: 5432
      SRV_BASE_URL: http://localhost:8000/api/v1
      
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8000/health || exit 1"]
      interval: 10s
      retries: 3
      timeout: 10s
    depends_on:
        postgres:
          condition: service_healthy