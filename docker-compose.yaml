services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: shorturls
      POSTGRES_PASSWORD: shorturls
      POSTGRES_DB: main
    ports:
      - "5435:5432"
    volumes:
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thebugs -d main"]
      interval: 10s
      timeout: 5s
      retries: 5
  shorturl-backend:
    build:
      context: .
      dockerfile: ./deploy/Dockerfile
    volumes:
      - ./config/config.yaml:/app/config/config.yaml
    ports:
      - "8000:8000"